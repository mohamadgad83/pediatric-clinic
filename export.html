<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📦 تصدير أكواد PediaCare + التوثيق</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: white;
            padding: 3rem 2.5rem;
            border-radius: 28px;
            max-width: 650px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        .card h1 {
            font-size: 2.2rem;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        .card p {
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(37, 99, 235, 0.5);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: #475569;
            min-height: 2rem;
        }
        .status.loading {
            color: #2563eb;
        }
        .status.done {
            color: #16a34a;
        }
        .status.error {
            color: #dc2626;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
        }
        .badge {
            display: inline-block;
            background: #e2e8f0;
            padding: 0.2rem 0.8rem;
            border-radius: 999px;
            font-size: 0.7rem;
            color: #475569;
        }
        .options {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0 1.5rem;
            flex-wrap: wrap;
        }
        .options label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            color: #475569;
            cursor: pointer;
        }
        .options input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2563eb;
        }
        #fileTree {
            margin-top: 1rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 12px;
            text-align: right;
            font-size: 0.8rem;
            color: #475569;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            display: none;
        }
        #fileTree span {
            display: inline-block;
            background: #e2e8f0;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            margin: 0.1rem;
            font-family: monospace;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📦 PediaCare</h1>
        <p>اضغط الزر لتصدير كل أكواد المشروع + التوثيق في ملف واحد</p>

        <div class="options">
            <label>
                <input type="checkbox" id="includeDocs" checked />
                📄 تضمين التوثيق
            </label>
            <label>
                <input type="checkbox" id="includeCode" checked />
                💻 تضمين الأكواد
            </label>
        </div>

        <button class="btn" id="exportBtn">
            ⬇️ تصدير الأكواد + التوثيق
        </button>

        <div class="status" id="status">⏳ جاهز للتصدير</div>

        <div id="fileTree"></div>

        <div class="footer">
            <span class="badge">🔧 Next.js + Supabase</span>
            <span class="badge">🩺 عيادة أطفال</span>
            <span class="badge">📄 مع التوثيق</span>
        </div>
    </div>

    <script>
        // ============================================================
        // 📄 محتوى التوثيق الكامل
        // ============================================================
        const DOCUMENTATION_CONTENT = `
        ========================================
        📚 توثيق مشروع PediaCare
        ========================================

        🏥 PediaCare – نظام إدارة عيادات الأطفال
        ----------------------------------------
        نظام متكامل لإدارة عيادات الأطفال، مبني باستخدام Next.js 14 و Supabase،
        مع نظام مصادقة مستقل يعتمد على clinic_profiles.

        🔗 الروابط المهمة
        -----------------
        التطبيق: https://pediatric-clinic-psi.vercel.app
        GitHub: https://github.com/mohamadgad83/pediatric-clinic
        Supabase: https://app.supabase.com/project/cuchwughgvhiwgaoodib

        🛠️ التقنيات المستخدمة
        ---------------------
        Next.js 14.2.5  →  الإطار الرئيسي
        TypeScript 5.5.3  →  لغة البرمجة
        Tailwind CSS 3.4.6  →  التصميم والتنسيق
        Supabase  →  قاعدة البيانات + المصادقة
        Vercel  →  النشر والاستضافة

        📂 هيكل المشروع
        ---------------
        pediatric-clinic/
        ├── app/
        │   ├── api/login/route.ts          # API تسجيل الدخول
        │   ├── auth/callback/route.ts      # (غير مستخدم حالياً)
        │   ├── doctor/
        │   │   ├── page.tsx                # لوحة تحكم الطبيب
        │   │   ├── patients/
        │   │   │   ├── page.tsx            # قائمة المرضى (طبيب)
        │   │   │   ├── new/page.tsx        # إضافة مريض (طبيب)
        │   │   │   └── [id]/page.tsx       # ملف مريض
        │   │   └── queue/page.tsx          # قائمة الانتظار (طبيب)
        │   ├── assistant/
        │   │   ├── page.tsx                # لوحة تحكم المساعد
        │   │   ├── patients/
        │   │   │   ├── page.tsx            # قائمة المرضى (مساعد)
        │   │   │   └── new/page.tsx        # إضافة مريض (مساعد)
        │   │   └── queue/page.tsx          # قائمة الانتظار (مساعد)
        │   ├── login/page.tsx              # صفحة تسجيل الدخول
        │   ├── layout.tsx                  # التصميم الرئيسي
        │   ├── page.tsx                    # الصفحة الرئيسية (توجيه)
        │   └── globals.css                 # الأنماط العامة
        ├── components/                     # مكونات مشتركة
        ├── hooks/
        │   └── useAuth.ts                  # Hook للمصادقة
        ├── lib/
        │   └── supabase.ts                 # عميل Supabase
        ├── middleware.ts                   # حماية المسارات
        ├── .env.local                      # متغيرات البيئة
        ├── package.json
        ├── next.config.js
        └── tailwind.config.js

        🗄️ هيكل قاعدة البيانات
        ---------------------

        1. جدول clinic_profiles
        CREATE TABLE clinic_profiles (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            full_name TEXT NOT NULL,
            role TEXT NOT NULL CHECK (role IN ('doctor', 'assistant')),
            phone TEXT,
            avatar_url TEXT,
            username TEXT UNIQUE NOT NULL,
            email TEXT UNIQUE,
            password_hash TEXT,
            confirmed BOOLEAN DEFAULT TRUE,
            created_at TIMESTAMPTZ DEFAULT now(),
            updated_at TIMESTAMPTZ DEFAULT now()
        );

        2. جدول clinic_patients
        CREATE TABLE clinic_patients (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            name TEXT NOT NULL,
            birth_date DATE NOT NULL,
            gender TEXT CHECK (gender IN ('male', 'female')),
            parent_name TEXT NOT NULL,
            parent_phone TEXT NOT NULL,
            parent_email TEXT,
            address TEXT,
            custom_fields JSONB DEFAULT '{}'::jsonb,
            created_by UUID REFERENCES clinic_profiles(id),
            created_at TIMESTAMPTZ DEFAULT now(),
            updated_at TIMESTAMPTZ DEFAULT now()
        );

        3. جدول clinic_appointments
        CREATE TABLE clinic_appointments (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            patient_id UUID NOT NULL REFERENCES clinic_patients(id) ON DELETE CASCADE,
            appointment_date DATE NOT NULL,
            appointment_time TIME,
            queue_number INTEGER NOT NULL,
            status TEXT DEFAULT 'waiting' CHECK (status IN ('waiting', 'in_clinic', 'done', 'cancelled')),
            vital_signs JSONB DEFAULT '{}'::jsonb,
            chief_complaint TEXT,
            notes TEXT,
            created_by UUID REFERENCES clinic_profiles(id),
            created_at TIMESTAMPTZ DEFAULT now(),
            updated_at TIMESTAMPTZ DEFAULT now()
        );

        4. جدول clinic_medical_records
        CREATE TABLE clinic_medical_records (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            patient_id UUID NOT NULL REFERENCES clinic_patients(id) ON DELETE CASCADE,
            appointment_id UUID REFERENCES clinic_appointments(id) ON DELETE SET NULL,
            diagnosis TEXT NOT NULL,
            prescription JSONB DEFAULT '[]'::jsonb,
            notes TEXT,
            attachments TEXT[],
            created_by UUID REFERENCES clinic_profiles(id),
            created_at TIMESTAMPTZ DEFAULT now(),
            updated_at TIMESTAMPTZ DEFAULT now()
        );

        5. دالة التحقق من كلمة المرور
        CREATE OR REPLACE FUNCTION check_password(
            input_password TEXT,
            stored_hash TEXT
        )
        RETURNS BOOLEAN AS $$
        BEGIN
            RETURN stored_hash = crypt(input_password, stored_hash);
        END;
        $$ LANGUAGE plpgsql SECURITY DEFINER;

        🔐 نظام المصادقة
        ---------------
        - API: app/api/login/route.ts – يستقبل identifier و password، ويتحقق من المستخدم في clinic_profiles.
        - Middleware: middleware.ts – يتحقق من Cookies ويحمي المسارات (/doctor, /assistant).
        - Hook: hooks/useAuth.ts – يقرأ بيانات المستخدم من localStorage.

        👥 الصلاحيات
        -----------
        | الصلاحية                     | الطبيب | المساعد |
        |------------------------------|--------|---------|
        | عرض المرضى                   | ✅     | ✅      |
        | إضافة مريض                   | ✅     | ✅      |
        | تعديل مريض                   | ✅     | ✅      |
        | عرض ملف مريض                 | ✅     | ✅      |
        | إضافة سجل طبي                | ✅     | ❌      |
        | عرض قائمة الانتظار           | ✅     | ✅      |
        | إضافة للانتظار               | ❌     | ✅      |
        | تحديث حالة مريض              | ✅     | ❌      |

        📱 الصفحات الرئيسية
        ------------------
        /login                    صفحة تسجيل الدخول
        /doctor                   لوحة تحكم الطبيب
        /doctor/patients          قائمة المرضى
        /doctor/patients/[id]     ملف المريض
        /doctor/queue             قائمة الانتظار
        /assistant                لوحة تحكم المساعد
        /assistant/patients/new   إضافة مريض
        /assistant/queue          قائمة الانتظار

        ⚙️ إعدادات النشر (Vercel)
        -------------------------
        NEXT_PUBLIC_SUPABASE_URL=https://cuchwughgvhiwgaoodib.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

        🚀 الأخطاء الشائعة وحلولها
        --------------------------
        1. 404 Not Found على patients → استبدل patients بـ clinic_patients
        2. Invalid login credentials → استخدم doctor / Doctor@123456
        3. 401 Unauthorized → تأكد من SUPABASE_SERVICE_ROLE_KEY
        4. Failed to compile → تأكد من Interfaces في ملفات الـ Queue

        🔑 الحسابات التجريبية
        --------------------
        طبيب: doctor / Doctor@123456
        مساعد: assistant / Assistant@123456

        📌 ملخص سريع
        -----------
        ✅ المشروع شغال على: https://pediatric-clinic-psi.vercel.app
        ✅ تسجيل الدخول شغال بـ: doctor / Doctor@123456
        ✅ قاعدة البيانات جاهزة مع الجداول المطلوبة
        ✅ الصلاحيات مفعلة (طبيب/مساعد)

        ========================================
        📄 نهاية التوثيق
        ========================================
        `;

        // ============================================================
        // قائمة الملفات (هتتجمع من الصفحة نفسها)
        // ============================================================
        const FILES_TO_EXPORT = [
            { path: 'app/api/login/route.ts' },
            { path: 'app/assistant/page.tsx' },
            { path: 'app/assistant/patients/page.tsx' },
            { path: 'app/assistant/patients/new/page.tsx' },
            { path: 'app/assistant/queue/page.tsx' },
            { path: 'app/doctor/page.tsx' },
            { path: 'app/doctor/patients/page.tsx' },
            { path: 'app/doctor/patients/[id]/page.tsx' },
            { path: 'app/doctor/queue/page.tsx' },
            { path: 'app/login/page.tsx' },
            { path: 'app/layout.tsx' },
            { path: 'app/page.tsx' },
            { path: 'app/globals.css' },
            { path: 'hooks/useAuth.ts' },
            { path: 'lib/supabase.ts' },
            { path: 'middleware.ts' },
            { path: 'package.json' },
            { path: 'next.config.js' },
            { path: 'tailwind.config.js' },
            { path: 'postcss.config.js' },
            { path: 'tsconfig.json' }
        ];

        // ============================================================
        // 🚀 زر التصدير
        // ============================================================
        document.getElementById('exportBtn').addEventListener('click', async function() {
            const btn = this;
            const status = document.getElementById('status');
            const includeDocs = document.getElementById('includeDocs').checked;
            const includeCode = document.getElementById('includeCode').checked;

            btn.disabled = true;
            btn.textContent = '⏳ جاري التصدير...';
            status.textContent = '⏳ جاري جمع الملفات...';
            status.className = 'status loading';

            let fullContent = '';
            let fileCount = 0;
            let missingCount = 0;

            try {
                // 1. عنوان الملف
                fullContent += '# 📦 PediaCare - Full Project Code + Documentation\n\n';
                fullContent += `Generated on: ${new Date().toLocaleString('ar-EG')}\n`;
                fullContent += '============================================================\n\n';

                // 2. تصدير الأكواد
                if (includeCode) {
                    fullContent += '# 💻 Project Code\n\n';
                    
                    // ⭐ الطريقة الجديدة: نجيب الملفات من GitHub مباشرة
                    const baseURL = 'https://raw.githubusercontent.com/mohamadgad83/pediatric-clinic/main/';
                    
                    for (const file of FILES_TO_EXPORT) {
                        status.textContent = `⏳ جاري تحميل: ${file.path}`;
                        try {
                            const res = await fetch(baseURL + file.path);
                            if (res.ok) {
                                const content = await res.text();
                                fullContent += `📁 FILE: ${file.path}\n`;
                                fullContent += '============================================================\n';
                                fullContent += content;
                                fullContent += '\n\n============================================================\n\n';
                                fileCount++;
                            } else {
                                fullContent += `📁 FILE: ${file.path} (⚠️ غير موجود)\n`;
                                fullContent += '============================================================\n';
                                fullContent += '❌ الملف غير موجود\n\n';
                                missingCount++;
                            }
                        } catch (e) {
                            fullContent += `📁 FILE: ${file.path} (⚠️ خطأ)\n`;
                            fullContent += '============================================================\n';
                            fullContent += `❌ خطأ: ${e.message}\n\n`;
                            missingCount++;
                        }
                    }
                }

                // 3. إضافة التوثيق
                if (includeDocs) {
                    fullContent += '\n\n';
                    fullContent += DOCUMENTATION_CONTENT;
                }

                // 4. إنشاء ملف للتحميل
                const blob = new Blob([fullContent], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pediaCare-full-${new Date().toISOString().slice(0,10)}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                let msg = `✅ تم التصدير بنجاح! (${fileCount} ملف`;
                if (missingCount > 0) msg += `، ${missingCount} ملف غير موجود`;
                msg += `، ${Math.round(blob.size / 1024)} KB)`;
                status.textContent = msg;
                status.className = 'status done';
                btn.textContent = '✅ تم!';

            } catch (error) {
                status.textContent = `❌ خطأ: ${error.message}`;
                status.className = 'status error';
                btn.textContent = '⬇️ حاول مرة أخرى';
            } finally {
                btn.disabled = false;
                setTimeout(() => {
                    btn.textContent = '⬇️ تصدير الأكواد + التوثيق';
                }, 3000);
            }
        });
    </script>
</body>
</html>
